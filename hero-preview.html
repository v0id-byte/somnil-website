<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Somnil — Hero 预览稿（去 AI 味 + 产品入主角）</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:        oklch(0.07 0.018 258);
    --bg-2:      oklch(0.105 0.014 255);
    --line:      oklch(0.19 0.009 255);
    --text:      oklch(0.945 0.006 85);
    --text-2:    oklch(0.62 0.008 85);
    --text-3:    oklch(0.42 0.006 85);
    --accent:    oklch(0.70 0.12 290);
    --amber:     oklch(0.76 0.10 70);
    --sans: 'Inter','Noto Sans SC',system-ui,sans-serif;
    --ease: cubic-bezier(.22,1,.36,1);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text); font-family:var(--sans);
    font-weight:500; line-height:1.7; -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }

  /* preview tag (unobtrusive) */
  .pv-tag{
    position:fixed; top:14px; right:16px; z-index:50;
    font-size:11px; letter-spacing:.06em; color:var(--text-3);
    border:1px solid var(--line); border-radius:999px; padding:5px 12px;
    background:oklch(0.07 0.018 258 / .6); backdrop-filter:blur(8px);
  }

  /* ── NAV (de-terminal: sans, quiet) ── */
  nav{
    position:fixed; inset:0 0 auto 0; z-index:40; height:64px;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 40px;
  }
  .wordmark{ font-weight:700; font-size:17px; letter-spacing:.10em; color:var(--text); text-decoration:none; }
  .wordmark b{ color:var(--accent); }
  .nav-links{ display:flex; gap:32px; list-style:none; }
  .nav-links a{ font-size:14px; font-weight:500; color:var(--text-2); text-decoration:none; transition:color .2s; }
  .nav-links a:hover{ color:var(--text); }
  .nav-cta{
    font-size:13px; font-weight:600; color:var(--bg); background:var(--text);
    text-decoration:none; padding:8px 18px; border-radius:999px; transition:opacity .2s;
  }
  .nav-cta:hover{ opacity:.85; }

  /* ── HERO ── */
  #hero{
    min-height:100vh; position:relative; overflow:hidden;
    display:flex; flex-direction:column; align-items:center;
    text-align:center; padding:128px 24px 0;
  }
  /* single STATIC warm glow — no animation, no aurora, no canvas */
  .glow{
    position:absolute; left:50%; top:46%; transform:translate(-50%,-50%);
    width:1100px; height:760px; pointer-events:none; z-index:0;
    background:
      radial-gradient(closest-side, oklch(0.76 0.10 70 / .12), transparent 70%),
      radial-gradient(closest-side, oklch(0.70 0.12 290 / .10), transparent 72%);
    filter:blur(8px);
  }
  .hero-inner{ position:relative; z-index:2; max-width:780px; }

  .eyebrow{
    font-size:13px; font-weight:600; letter-spacing:.02em;
    color:var(--accent); margin-bottom:22px;
    opacity:0; animation:rise .8s var(--ease) .05s forwards;
  }
  h1{
    font-weight:700; font-size:clamp(44px,6vw,84px);
    line-height:1.05; letter-spacing:-.028em; color:var(--text);
    margin-bottom:26px;
    opacity:0; animation:rise .9s var(--ease) .14s forwards;
  }
  h1 .ac{ color:var(--accent); }
  .subhead{
    font-size:18px; font-weight:500; color:var(--text-2);
    line-height:1.65; max-width:540px; margin:0 auto 38px;
    opacity:0; animation:rise .9s var(--ease) .24s forwards;
  }
  .subhead b{ color:var(--text); font-weight:600; }
  .actions{
    display:flex; align-items:center; justify-content:center; gap:22px;
    opacity:0; animation:rise .9s var(--ease) .34s forwards;
  }
  .btn{
    background:var(--text); color:var(--bg);
    font-size:15px; font-weight:600; text-decoration:none;
    padding:13px 30px; border-radius:999px; transition:opacity .2s,transform .2s;
  }
  .btn:hover{ opacity:.9; }
  .btn-quiet{
    display:inline-flex; align-items:center; gap:6px;
    font-size:15px; color:var(--text-2); text-decoration:none; transition:color .2s;
  }
  .btn-quiet:hover{ color:var(--text); }
  .btn-quiet svg{ transition:transform .2s; }
  .btn-quiet:hover svg{ transform:translateX(3px); }

  /* product render */
  .product{
    position:relative; z-index:1; margin-top:30px;
    width:min(560px,86vw);
    opacity:0; animation:rise 1.1s var(--ease) .46s forwards;
  }
  .product svg{ width:100%; height:auto; display:block; }

  /* honest stat strip — sans, no mono-caps terminal look */
  .stats{
    position:relative; z-index:2;
    display:flex; gap:0; margin:18px auto 0; max-width:680px;
    border-top:1px solid var(--line);
    opacity:0; animation:rise 1s var(--ease) .6s forwards;
  }
  .stat{ flex:1; padding:22px 18px; }
  .stat + .stat{ border-left:1px solid var(--line); }
  .stat .v{ font-size:26px; font-weight:700; letter-spacing:-.02em; color:var(--text); line-height:1; margin-bottom:6px; }
  .stat .v sup{ font-size:15px; color:var(--accent); margin-left:2px; font-weight:600; }
  .stat .k{ font-size:13px; color:var(--text-3); font-weight:500; }

  @keyframes rise{ from{opacity:0; transform:translateY(20px)} to{opacity:1; transform:none} }
  @media (prefers-reduced-motion: reduce){
    .eyebrow,h1,.subhead,.actions,.product,.stats{ animation:none; opacity:1; }
  }
  @media (max-width:768px){
    nav{ padding:0 18px; }
    .nav-links{ display:none; }
    #hero{ padding:104px 18px 0; }
    .actions{ flex-direction:column; }
    .stats{ flex-wrap:wrap; }
  }
</style>
</head>
<body>

<div class="pv-tag">预览稿 · 未上线</div>

<nav>
  <a href="#" class="wordmark">SOMNI<b>L</b></a>
  <ul class="nav-links">
    <li><a href="#">问题</a></li>
    <li><a href="#">干预</a></li>
    <li><a href="#">技术</a></li>
  </ul>
  <a href="#" class="nav-cta">加入候补</a>
</nav>

<section id="hero">
  <div class="glow" aria-hidden="true"></div>

  <div class="hero-inner">
    <div class="eyebrow">Somnil — 睡眠头环</div>
    <h1>半夜惊醒，<br><span class="ac">不是你的错。</span></h1>
    <p class="subhead">睡前戴上这枚<b>柔软的头环</b>，它在焦虑前兆出现的瞬间，自动调节温度与声场——在你意识到之前，一切已经调好。</p>
    <div class="actions">
      <a href="#" class="btn">加入候补名单</a>
      <a href="#" class="btn-quiet">了解工作原理
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
    </div>
  </div>

  <!-- ── 产品渲染（纯 SVG 手绘柔性睡眠头环） ── -->
  <div class="product" aria-label="Somnil 柔性睡眠头环">
    <svg viewBox="0 0 560 340" role="img">
      <defs>
        <!-- soft fabric body -->
        <linearGradient id="fabric" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0"   stop-color="#454a60"/>
          <stop offset="0.45" stop-color="#2c2f3d"/>
          <stop offset="1"   stop-color="#15161d"/>
        </linearGradient>
        <!-- inner band (darker) -->
        <linearGradient id="fabric2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#3a3e52"/>
          <stop offset="1" stop-color="#191b23"/>
        </linearGradient>
        <!-- sensor pod -->
        <linearGradient id="pod" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#33384a"/>
          <stop offset="1" stop-color="#101117"/>
        </linearGradient>
        <radialGradient id="led" cx="50%" cy="50%" r="50%">
          <stop offset="0"  stop-color="oklch(0.82 0.13 290)"/>
          <stop offset="1"  stop-color="oklch(0.55 0.14 290)"/>
        </radialGradient>
        <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="9"/>
        </filter>
        <filter id="soft2" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="3"/>
        </filter>
      </defs>

      <!-- floating shadow -->
      <ellipse cx="280" cy="276" rx="186" ry="22" fill="#000" opacity="0.45" filter="url(#soft)"/>

      <!-- band body (forehead crescent, 3/4) -->
      <path d="M84,196
               C190,120 370,120 476,196
               C482,206 482,224 476,234
               C370,184 190,184 84,234
               C78,224 78,206 84,196 Z"
            fill="url(#fabric)"/>

      <!-- inner band edge for depth -->
      <path d="M104,208
               C200,146 360,146 456,208
               C460,214 460,224 456,230
               C360,176 200,176 104,230
               C100,224 100,214 104,208 Z"
            fill="url(#fabric2)" opacity="0.9"/>

      <!-- knit seam line -->
      <path d="M96,210 C195,150 365,150 464,210"
            fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>

      <!-- warm rim light on top edge -->
      <path d="M90,196 C193,124 367,124 470,196"
            fill="none" stroke="oklch(0.78 0.10 70)" stroke-opacity="0.30" stroke-width="2.4" filter="url(#soft2)"/>

      <!-- soft top highlight (fabric volume) -->
      <path d="M120,180 C210,138 350,138 440,180
               C350,150 210,150 120,180 Z"
            fill="#ffffff" opacity="0.05"/>

      <!-- center sensor pod (the EEG module over the forehead) -->
      <rect x="222" y="150" width="116" height="48" rx="22" fill="url(#pod)"/>
      <rect x="222" y="150" width="116" height="48" rx="22" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
      <!-- subtle wordmark on pod -->
      <text x="280" y="179" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="700" letter-spacing="2.5" fill="#9aa0b5" fill-opacity="0.7">SOMNIL</text>
      <!-- accent indicator -->
      <circle cx="280" cy="150" r="9" fill="url(#led)" filter="url(#soft2)"/>
      <circle cx="280" cy="150" r="3.4" fill="oklch(0.92 0.06 290)"/>
    </svg>
  </div>

  <!-- honest stats, sans (no mono terminal labels) -->
  <div class="stats">
    <div class="stat">
      <div class="v">0<sup>操作</sup></div>
      <div class="k">戴上即可入睡，全程无需动手</div>
    </div>
    <div class="stat">
      <div class="v">80<sup>%</sup></div>
      <div class="k">睡眠分期精度 · 逼近人类技师水平</div>
    </div>
  </div>
</section>

</body>
</html>
